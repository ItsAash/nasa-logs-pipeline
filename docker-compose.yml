version: "3.8"

# This file spins up TWO services:
#   1. Zookeeper  — Kafka's internal manager
#   2. Kafka      — The actual message broker we send logs to

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181 # Port Zookeeper listens on
      ZOOKEEPER_TICK_TIME: 2000 # Heartbeat interval in milliseconds
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy # Wait for Zookeeper to be ready first
    ports:
      - "9092:9092" # This is the port your Python script connects to
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181 # Tell Kafka where Zookeeper is
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # Fine for local dev (1 broker only)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Auto-create the "nasa-logs" topic on first use
      KAFKA_LOG_RETENTION_HOURS: 24 # Keep messages for 24 hours
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
